events {
  worker_connections 1024;
}

http {
  # ── Upstream definitions ─────────────────────────────────────────────────
  # Named upstreams make proxy_pass targets explicit, simplify future
  # load-balancing additions, and produce cleaner error log messages.

  upstream api_upstream {
    server api:3001;
    keepalive 32;
  }

  upstream web_upstream {
    server web:3000;
    keepalive 32;
  }

  upstream admin_upstream {
    server admin:3002;
    keepalive 32;
  }

  # ── Shared proxy behaviour ────────────────────────────────────────────────
  # Applied to all proxied requests. Defined once here, not repeated per block.

  proxy_http_version      1.1;
  proxy_set_header        Upgrade           $http_upgrade;
  proxy_set_header        Connection        'upgrade';
  proxy_set_header        Host              $host;
  proxy_set_header        X-Real-IP         $remote_addr;
  # Strip any client-supplied X-Forwarded-For before setting it fresh.
  # Appending would allow IP spoofing to bypass per-IP rate limits.
  proxy_set_header        X-Forwarded-For   $remote_addr;
  proxy_set_header        X-Forwarded-Proto $scheme;
  proxy_set_header        X-Forwarded-Host  $host;
  proxy_cache_bypass      $http_upgrade;

  proxy_connect_timeout   10s;
  proxy_send_timeout      60s;
  proxy_read_timeout      60s;
  proxy_buffering         off;    # Required for SSE / streaming responses

  # ── Compression ───────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   5;
  gzip_min_length   256;
  gzip_types
    application/javascript
    application/json
    application/xml
    text/css
    text/html
    text/plain
    text/xml;

  # ── Logging format ────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time';

  access_log /var/log/nginx/access.log main;
  error_log  /var/log/nginx/error.log  warn;

  # ── Public site — port 80 ─────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # API — must come before the catch-all location
    location /api {
      proxy_pass http://api_upstream;
    }

    # Public Next.js site
    location / {
      proxy_pass http://web_upstream;
    }
  }

  # ── Admin panel — port 3002 ───────────────────────────────────────────────
  # Separate server block keeps admin on a distinct port so the admin's
  # httpOnly refresh token cookie is scoped to localhost:3002 (same origin
  # as all admin /api calls routed through this block).
  server {
    listen 3002;
    server_name _;

    # API — must come before the catch-all location
    location /api {
      proxy_pass http://api_upstream;
    }

    # Admin Next.js app
    location / {
      proxy_pass http://admin_upstream;
    }
  }
}
