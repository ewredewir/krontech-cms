services:

  # ── Stateful infrastructure ───────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    ports:
      - "5433:5432"     # host:5433 → container:5432 (avoids clash with local PG)
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:     ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout:  5s
      retries:  5

  redis:
    image: redis:7-alpine
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:     ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout:  3s
      retries:  5

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO web console

  # ── One-shot migrator ─────────────────────────────────────────────────────
  # Runs prisma migrate deploy + seed, then exits.
  # api depends on this completing successfully before it starts.

  migrator:
    build:
      context:    .
      dockerfile: apps/api/Dockerfile
    working_dir: /app/apps/api
    command:     sh -c "npx prisma migrate deploy && npx prisma db seed"
    environment:
      DATABASE_URL: ${DOCKER_DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Application services ──────────────────────────────────────────────────

  api:
    build:
      context:    .
      dockerfile: apps/api/Dockerfile
    environment:
      NODE_ENV:             production
      DATABASE_URL:         ${DOCKER_DATABASE_URL}
      REDIS_URL:            ${DOCKER_REDIS_URL}
      JWT_ACCESS_SECRET:    ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET:   ${JWT_REFRESH_SECRET}
      S3_ENDPOINT:          ${S3_ENDPOINT}
      S3_BUCKET:            ${S3_BUCKET}
      S3_ACCESS_KEY:        ${S3_ACCESS_KEY}
      S3_SECRET_KEY:        ${S3_SECRET_KEY}
      REVALIDATE_SECRET:    ${REVALIDATE_SECRET}
      TURNSTILE_SECRET_KEY: ${TURNSTILE_SECRET_KEY}
    depends_on:
      migrator:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3001/health').then(r => { if(r.ok) process.exit(0); else process.exit(1); }).catch(() => process.exit(1))\""]
      interval:     10s
      timeout:       5s
      retries:       5
      start_period: 20s
    # api is internal — reachable only via nginx, never exposed directly
    # to the host. Remove this comment and add ports only for local debugging.

  web:
    build:
      context:    .
      dockerfile: apps/web/Dockerfile
      args:
        # BUILD-TIME: baked into the JS bundle. Changing requires --build.
        NEXT_PUBLIC_API_URL:   ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_MEDIA_HOST: ${NEXT_PUBLIC_MEDIA_HOST}
    environment:
      NODE_ENV:            production
      PORT:                "3000"
      HOSTNAME:            "0.0.0.0"
      INTERNAL_MEDIA_HOST: ${INTERNAL_MEDIA_HOST}
      INTERNAL_API_URL:    ${INTERNAL_API_URL}
      REVALIDATE_SECRET:   ${REVALIDATE_SECRET}
      ROBOTS_DISALLOW_ALL: ${ROBOTS_DISALLOW_ALL}
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3000/tr',{redirect:'follow'}).then(r => {if(r.ok) process.exit(0); else process.exit(1)}).catch(() => process.exit(1))\""]
      interval:     10s
      timeout:       5s
      retries:       6
      start_period: 30s
    # web is internal — only reachable via nginx:80

  admin:
    build:
      context:    .
      dockerfile: apps/admin/Dockerfile
      args:
        # BUILD-TIME: baked into the JS bundle. Changing requires --build.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    environment:
      NODE_ENV: production
      PORT:     "3002"
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:3002/').then(r => {if(r.ok) process.exit(0); else process.exit(1)}).catch(() => process.exit(1))\""]
      interval:     10s
      timeout:       5s
      retries:       6
      start_period: 30s
    # admin is internal — only reachable via nginx:3002

  # ── Reverse proxy ─────────────────────────────────────────────────────────
  # Single nginx instance handles all external traffic:
  #   :80   → public site (web) + API pass-through
  #   :3002 → admin panel + API pass-through (separate origin for cookie scoping)
  #
  # Neither web nor admin expose host ports directly.
  # All browser→API traffic is same-origin from the browser's perspective,
  # ensuring httpOnly refresh token cookies are sent correctly.

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"       # public site + API
      - "3002:3002"   # admin panel + API (separate cookie origin)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
      api:
        condition: service_healthy

  # ── Dev utilities ─────────────────────────────────────────────────────────

  mailhog:
    image: mailhog/mailhog
    ports:
      - "8025:8025"   # web UI
      - "1025:1025"   # SMTP

volumes:
  postgres_data:
  redis_data:
  minio_data: